<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D мир тюленей и гусей - Живое движение</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 24px;
            border-radius: 40px;
            pointer-events: none;
            z-index: 100;
            font-size: 16px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #info span { display: inline-block; margin: 0 6px; }
        .emoji-big { font-size: 22px; }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            background: rgba(0,0,0,0.4);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">🌊 3D мир забавных тюленей и смешных гусей  <span>🦭</span> <span>🪿</span> <span>🐧</span></div>
    <div id="status">🔄 Животные двигаются! Нажми и вращай мышкой</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ----- Сцена, камера, рендереры -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(14, 10, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.target.set(0, 2, 0);
        controls.maxPolarAngle = Math.PI / 2.3;
        controls.minDistance = 5;
        controls.maxDistance = 30;

        // ----- Освещение -----
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1);
        sunLight.position.set(10, 25, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -20;
        sunLight.shadow.camera.right = 20;
        sunLight.shadow.camera.top = 20;
        sunLight.shadow.camera.bottom = -20;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0xccddff, 0.5);
        fillLight.position.set(-10, 5, -10);
        scene.add(fillLight);

        const backLight = new THREE.DirectionalLight(0xffccaa, 0.3);
        backLight.position.set(-5, 0, 15);
        scene.add(backLight);

        // ----- Ландшафт -----
        // Земля
        const groundGeometry = new THREE.CircleGeometry(9, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x7cb342, 
            roughness: 0.8,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);

        // Трава
        for (let i = 0; i < 80; i++) {
            const bladeMat = new THREE.MeshStandardMaterial({ color: 0x5a9e3e });
            const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.09, 0.12 + Math.random()*0.25), bladeMat);
            blade.position.y = 0.1;
            blade.castShadow = true;
            blade.receiveShadow = true;
            const angle = Math.random() * Math.PI * 2;
            const radius = 0.5 + Math.random() * 7.5;
            blade.position.set(Math.cos(angle)*radius, 0, Math.sin(angle)*radius);
            blade.rotation.set(Math.random()*0.3, Math.random()*Math.PI*2, Math.random()*0.3);
            scene.add(blade);
        }

        // Вода
        const waterGeometry = new THREE.CircleGeometry(13, 32);
        const waterMaterial = new THREE.MeshStandardMaterial({
            color: 0x3a8fe7,
            transparent: true,
            opacity: 0.35,
            roughness: 0.2,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const water = new THREE.Mesh(waterGeometry, waterMaterial);
        water.rotation.x = -Math.PI / 2;
        water.position.y = -0.15;
        scene.add(water);

        // Камни
        for (let i = 0; i < 25; i++) {
            const stoneMat = new THREE.MeshStandardMaterial({ color: 0x8a9ba8, roughness: 0.7 });
            const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15 + Math.random()*0.35), stoneMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.5 + Math.random() * 5;
            stone.position.set(Math.cos(angle)*radius, 0.1, Math.sin(angle)*radius);
            stone.castShadow = true;
            stone.receiveShadow = true;
            stone.rotation.set(Math.random(), Math.random(), Math.random());
            scene.add(stone);
        }

        // Деревья
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.4, 0.9), trunkMat);
            trunk.position.y = 0.45;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(0.7, 6), leavesMat);
            leaves.position.y = 1.0;
            leaves.castShadow = true;
            leaves.receiveShadow = true;
            group.add(leaves);
            group.position.set(x, 0, z);
            return group;
        }

        const treePositions = [
            [-4.5, -4], [5, -3.5], [-5, 4.5], [5.5, 4.2], [-6.5, -1.5], [7, 1.8], [-7, 2.5], [2, -6.5], [-2, 6.5]
        ];
        treePositions.forEach(pos => {
            const tree = createTree(pos[0], pos[1]);
            scene.add(tree);
        });

        // ----- Фабрика персонажей -----
        function createLabel(text, color = '#FFD700', size = '20px') {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = size;
            div.style.fontWeight = 'bold';
            div.style.textShadow = '2px 2px 6px rgba(0,0,0,0.6)';
            div.style.background = 'rgba(0,0,0,0.4)';
            div.style.padding = '2px 12px';
            div.style.borderRadius = '30px';
            div.style.backdropFilter = 'blur(3px)';
            div.style.border = '1px solid rgba(255,255,255,0.3)';
            div.style.pointerEvents = 'none';
            return new CSS2DObject(div);
        }

        // Тюлень
        function createSeal(color = 0x6a8c9e, name = 'Тюлень') {
            const group = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, emissive: new THREE.Color(0x1a2a3a), emissiveIntensity: 0.05 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 24, 24), bodyMat);
            body.scale.set(1.2, 0.8, 1.3);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            const headMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 20, 20), headMat);
            head.position.set(0.7, 0.9, 0.2);
            head.scale.set(0.9, 0.8, 0.8);
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);

            const noseMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const nose = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8), noseMat);
            nose.position.set(1.0, 0.9, 0.4);
            group.add(nose);

            const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8), eyeWhiteMat);
            eyeL.position.set(0.85, 1.05, 0.0);
            group.add(eyeL);
            const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6), pupilMat);
            pupilL.position.set(0.9, 1.05, 0.15);
            group.add(pupilL);

            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8), eyeWhiteMat);
            eyeR.position.set(0.85, 1.05, 0.4);
            group.add(eyeR);
            const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6), pupilMat);
            pupilR.position.set(0.9, 1.05, 0.55);
            group.add(pupilR);

            const finMat = new THREE.MeshStandardMaterial({ color: 0x4a6a7a });
            const finL = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8), finMat);
            finL.scale.set(0.6, 0.3, 0.4);
            finL.position.set(0.4, 0.5, -0.6);
            group.add(finL);
            const finR = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8), finMat);
            finR.scale.set(0.6, 0.3, 0.4);
            finR.position.set(0.4, 0.5, 1.0);
            group.add(finR);

            const tailMat = new THREE.MeshStandardMaterial({ color: 0x4a6a7a });
            const tail = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8), tailMat);
            tail.scale.set(0.9, 0.2, 0.5);
            tail.position.set(-0.7, 0.3, 0.2);
            group.add(tail);

            // Усы
            const whiskerMat = new THREE.LineBasicMaterial({ color: 0xcccccc });
            for (let side = -1; side <= 1; side+=2) {
                const points = [];
                points.push(new THREE.Vector3(0.95, 0.85, 0.2 + side*0.1));
                points.push(new THREE.Vector3(1.25, 0.75, 0.2 + side*0.35));
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, whiskerMat);
                group.add(line);
            }

            const label = createLabel('🦭 ' + name, '#FFD700', '20px');
            label.position.set(0, 1.7, 0);
            group.add(label);

            return group;
        }

        // Гусь
        function createGoose(color = 0xf5f5f5, name = 'Гусь') {
            const group = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 20, 20), bodyMat);
            body.scale.set(1.0, 0.9, 1.3);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            const neckMat = new THREE.MeshStandardMaterial({ color: 0xe8e0d0 });
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 0.6), neckMat);
            neck.position.set(0.6, 1.0, 0.2);
            neck.rotation.z = 0.2;
            neck.castShadow = true;
            neck.receiveShadow = true;
            group.add(neck);

            const headMat = new THREE.MeshStandardMaterial({ color: 0xe8e0d0 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16), headMat);
            head.position.set(0.9, 1.2, 0.2);
            head.scale.set(0.9, 0.8, 0.8);
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);

            const beakMat = new THREE.MeshStandardMaterial({ color: 0xff8c00 });
            const beak = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.25, 6), beakMat);
            beak.position.set(1.1, 1.15, 0.4);
            beak.rotation.x = 0.1;
            beak.rotation.z = -0.2;
            group.add(beak);
            
            const beak2 = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.15, 6), beakMat);
            beak2.position.set(1.1, 1.05, 0.45);
            beak2.rotation.x = 0.4;
            beak2.rotation.z = -0.2;
            group.add(beak2);

            const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const browMat = new THREE.LineBasicMaterial({ color: 0x333333 });

            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8), eyeWhiteMat);
            eyeL.position.set(0.9, 1.25, 0.0);
            group.add(eyeL);
            const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6), pupilMat);
            pupilL.position.set(0.95, 1.25, 0.08);
            group.add(pupilL);

            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8), eyeWhiteMat);
            eyeR.position.set(0.9, 1.25, 0.4);
            group.add(eyeR);
            const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6), pupilMat);
            pupilR.position.set(0.95, 1.25, 0.48);
            group.add(pupilR);

            const browPointsL = [new THREE.Vector3(0.8, 1.35, 0.0), new THREE.Vector3(0.95, 1.38, 0.0)];
            const browGeoL = new THREE.BufferGeometry().setFromPoints(browPointsL);
            const browL = new THREE.Line(browGeoL, browMat);
            group.add(browL);
            
            const browPointsR = [new THREE.Vector3(0.8, 1.35, 0.4), new THREE.Vector3(0.95, 1.38, 0.4)];
            const browGeoR = new THREE.BufferGeometry().setFromPoints(browPointsR);
            const browR = new THREE.Line(browGeoR, browMat);
            group.add(browR);

            const wingMat = new THREE.MeshStandardMaterial({ color: 0xd0c8b0 });
            const wingL = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8), wingMat);
            wingL.scale.set(0.8, 0.2, 0.4);
            wingL.position.set(0.0, 0.7, -0.6);
            group.add(wingL);
            const wingR = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8), wingMat);
            wingR.scale.set(0.8, 0.2, 0.4);
            wingR.position.set(0.0, 0.7, 1.0);
            group.add(wingR);

            const label = createLabel('🪿 ' + name, '#FFA500', '20px');
            label.position.set(0, 1.7, 0);
            group.add(label);

            return group;
        }

        // ----- Создаем существ с данными для движения -----
        const creatures = [];
        const sealNames = ['Снежок', 'Ластик', 'Плюшка', 'Моржик', 'Шлёпа'];
        const sealColors = [0x6a8c9e, 0x7a9cb0, 0x5a7c8e, 0x8aacbe, 0x4a6c7e];
        const gooseNames = ['Кряк', 'Гоголь', 'Шустрый', 'Топтыжка', 'Весельчак'];
        const gooseColors = [0xf5f5f5, 0xe8e0d0, 0xffffff, 0xeee8d5, 0xf0f0f0];

        // Тюлени
        for (let i = 0; i < 6; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 2 + Math.random() * 4.5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const seal = createSeal(sealColors[i % sealColors.length], sealNames[i % sealNames.length]);
            seal.position.set(x, 0.1, z);
            seal.rotation.y = Math.random() * Math.PI * 2;
            scene.add(seal);
            
            creatures.push({
                mesh: seal,
                type: 'seal',
                targetX: x,
                targetZ: z,
                speed: 0.4 + Math.random() * 0.6,
                phase: Math.random() * 100,
                radius: 1.5 + Math.random() * 3,
                angle: Math.random() * Math.PI * 2,
                centerX: 0,
                centerZ: 0,
                state: 'wander', // wander, sleep
                timer: 0,
                name: sealNames[i % sealNames.length]
            });
        }

        // Гуси
        for (let i = 0; i < 6; i++) {
            const angle = Math.random() * Math.PI * 2 + 0.5;
            const radius = 2 + Math.random() * 4.5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const goose = createGoose(gooseColors[i % gooseColors.length], gooseNames[i % gooseNames.length]);
            goose.position.set(x, 0.1, z);
            goose.rotation.y = Math.random() * Math.PI * 2;
            scene.add(goose);
            
            creatures.push({
                mesh: goose,
                type: 'goose',
                targetX: x,
                targetZ: z,
                speed: 0.5 + Math.random() * 0.7,
                phase: Math.random() * 100,
                radius: 1.5 + Math.random() * 3.5,
                angle: Math.random() * Math.PI * 2,
                centerX: 0,
                centerZ: 0,
                state: 'wander',
                timer: 0,
                name: gooseNames[i % gooseNames.length]
            });
        }

        // Мячики для веселья
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xff5733, emissive: new THREE.Color(0x442211), emissiveIntensity: 0.1 });
        const ball = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12), ballMat);
        ball.position.set(1.5, 0.3, 2.0);
        ball.castShadow = true;
        ball.receiveShadow = true;
        scene.add(ball);
        
        const ball2 = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12), new THREE.MeshStandardMaterial({ color: 0x33ff57 }));
        ball2.position.set(-2.0, 0.25, -2.5);
        ball2.castShadow = true;
        ball2.receiveShadow = true;
        scene.add(ball2);

        // ----- Система движения -----
        const time = { value: 0 };
        const islandRadius = 6.5;

        function updateCreatures(delta) {
            time.value += delta;
            
            creatures.forEach((creature, index) => {
                const mesh = creature.mesh;
                const pos = mesh.position;
                
                // Смена состояния
                creature.timer -= delta;
                if (creature.timer <= 0) {
                    creature.state = Math.random() > 0.7 ? 'sleep' : 'wander';
                    creature.timer = 3 + Math.random() * 5;
                    
                    if (creature.state === 'wander') {
                        // Новая случайная точка
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 1.5 + Math.random() * 4.5;
                        creature.targetX = Math.cos(angle) * radius;
                        creature.targetZ = Math.sin(angle) * radius;
                    }
                }

                // Движение
                if (creature.state === 'wander') {
                    const dx = creature.targetX - pos.x;
                    const dz = creature.targetZ - pos.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    
                    if (dist > 0.1) {
                        const moveSpeed = creature.speed * delta * 0.8;
                        const stepX = (dx / dist) * moveSpeed;
                        const stepZ = (dz / dist) * moveSpeed;
                        pos.x += stepX;
                        pos.z += stepZ;
                        
                        // Поворот в сторону движения
                        const targetAngle = Math.atan2(dx, dz);
                        let currentAngle = mesh.rotation.y;
                        let diff = targetAngle - currentAngle;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        mesh.rotation.y += diff * delta * 4;
                    } else {
                        // Достигли цели, новая цель
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 1.5 + Math.random() * 4.5;
                        creature.targetX = Math.cos(angle) * radius;
                        creature.targetZ = Math.sin(angle) * radius;
                    }
                } else {
                    // Сон - легкое покачивание
                    mesh.rotation.z = Math.sin(time.value * 1.5 + index) * 0.02;
                    mesh.rotation.x = Math.sin(time.value * 1.2 + index * 0.7) * 0.02;
                }

                // Ограничение движения в пределах острова
                const distFromCenter = Math.sqrt(pos.x*pos.x + pos.z*pos.z);
                if (distFromCenter > islandRadius) {
                    pos.x *= 0.98;
                    pos.z *= 0.98;
                    creature.targetX = pos.x * 0.8;
                    creature.targetZ = pos.z * 0.8;
                }

                // Анимация "дыхания"
                const breathe = Math.sin(time.value * 2.5 + index * 1.3) * 0.02;
                pos.y = 0.1 + breathe;

                // Маленькое вращение для тюленей (хвост)
                if (creature.type === 'seal') {
                    // Можно добавить движение хвоста, но для простоты оставим так
                }
            });
        }

        // ----- Анимационный цикл -----
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            // Ограничиваем дельта для плавности
            const safeDelta = Math.min(delta, 0.05);
            
            updateCreatures(safeDelta);
            controls.update();

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // ----- Ресайз -----
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ----- Звуки (имитация) через консоль -----
        setInterval(() => {
            const randomCreature = creatures[Math.floor(Math.random() * creatures.length)];
            if (randomCreature) {
                const name = randomCreature.name || 'зверь';
                const sound = randomCreature.type === 'seal' ? '🦭 Аррр!' : '🪿 Га-га-га!';
                console.log(`%c${sound}  (${name})`, 'font-size: 18px; color: #FFD700;');
            }
        }, 8000);

        console.log('🦭 3D мир ожил! Животные двигаются и издают звуки в консоли каждые 8 секунд.');
    </script>
</body>
</html>
